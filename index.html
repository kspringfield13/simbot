<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SimBot" />
    <meta name="description" content="Robot home simulation — manage your robots, tasks, and smart home" />
    <title>SimBot</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML = '<div style="color:white;padding:40px;font-family:monospace;background:#1a0000;min-height:100vh"><h1 style="color:#ff4444">JS Error</h1><p>' + msg + '</p><p>Source: ' + src + ':' + line + ':' + col + '</p><pre style="color:#ff8888;white-space:pre-wrap">' + (err && err.stack ? err.stack : 'no stack') + '</pre><button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:12px 24px;background:#ff4444;color:white;border:none;border-radius:8px;cursor:pointer">Clear Data + Reload</button></div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML = '<div style="color:white;padding:40px;font-family:monospace;background:#1a0000;min-height:100vh"><h1 style="color:#ff4444">Promise Error</h1><p>' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</p><pre style="color:#ff8888;white-space:pre-wrap">' + (e.reason && e.reason.stack ? e.reason.stack : 'no stack') + '</pre><button onclick="localStorage.clear();location.reload()" style="margin-top:20px;padding:12px 24px;background:#ff4444;color:white;border:none;border-radius:8px;cursor:pointer">Clear Data + Reload</button></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
